<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mapa Sanitario - Municipalidad de Córdoba</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Arial, sans-serif;
            color: #020202;
        }

        /* ========== MAPA ========== */
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 360px;
            right: 0;
            z-index: 1;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 360px;
            height: 100%;
            background: linear-gradient(180deg, #4a5568 0%, #5a6c7d 100%);
            box-shadow: 4px 0 20px rgba(0,0,0,0.25);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========== HEADER ========== */
        .sidebar-header {
            background: #005288;
            padding: 12px 8px;
            flex-shrink: 0;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
            margin-bottom: 6px;
        }

        .logo-container img {
            height: 38px;
            width: auto;
            display: block;
            object-fit: contain;
            flex-shrink: 0;
        }

        .header-divider {
            height: 1px;
            width: 100%;
            background: rgba(255,255,255,0.2);
            margin: 6px 0;
        }

        /* Tres barras de color institucionales */
        .header-bars {
            display: flex;
            height: 4px;
            width: 100%;
            margin-top: 4px;
        }
        .header-bars .bar { flex: 1; height: 100%; }

        .page-title {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            margin-top: 6px;
            padding: 6px 4px 0 4px;
            text-align: center;
            line-height: 1.3;
        }

        /* ========== BUSCADOR ========== */
        .search-container {
            padding: 10px 12px 0 12px;
            background: #FAFAFC;
            flex-shrink: 0;
        }

        #search-efector {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: white;
            color: #333;
            box-sizing: border-box;
        }

        #search-efector:focus {
            outline: none;
            border-color: #005288;
            box-shadow: 0 0 0 2px rgba(0,82,136,0.15);
        }

        /* ========== LEYENDA ICONOS ========== */
        .leyenda-container {
            padding: 10px 12px;
            background: #FAFAFC;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(0,0,0,0.07);
        }

        .leyenda-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #555;
            margin-bottom: 6px;
        }

        .leyenda-items {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .leyenda-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            color: #333;
        }

        .leyenda-item img {
            height: 22px;
            width: auto;
            flex-shrink: 0;
        }

        /* ========== FILTROS (scrollable) ========== */
        .filters-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #FAFAFC;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .filters-container::-webkit-scrollbar { width: 5px; }
        .filters-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.04); }
        .filters-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

        /* Grupo de filtros */
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-header {
            color: #020202;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-header-sub {
            color: #555;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }

        .filter-icon { font-size: 13px; }

        /* Select de zonas */
        .zona-select-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #selZONA {
            flex: 1;
            padding: 10px 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        #selZONA:focus {
            outline: none;
            border-color: #005288;
        }

        /* Botón volver */
        #return-button {
            display: none;
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            transition: background 0.2s;
        }

        #return-button:hover { background: #f1f3f5; }

        #return-button img {
            width: 20px;
            height: 20px;
            display: block;
            mix-blend-mode: multiply;
        }

        /* Checkboxes modernos */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            transition: all 0.2s ease;
        }

        .checkbox-label:hover {
            border-color: #005288;
            background: #f0f6fb;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #005288;
        }

        /* ========== STATUS ========== */
        .status-container {
            padding: 10px 12px;
            background: #8F9599;
            border-top: 1px solid rgba(0,0,0,0.12);
            flex-shrink: 0;
        }

        .status-text {
            color: #cbd5e0;
            font-size: 10px;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        /* ========== PANEL INFO ZONA (derecha del mapa) ========== */
        #zona-info {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            background: #fff;
            padding: 14px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            font-family: 'Inter', sans-serif;
            z-index: 1100;
            width: 300px;
            flex-direction: column;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }

        #zona-titulo {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 10px;
            color: #005288;
            text-align: center;
        }

        #zona-datos {
            font-size: 13px;
            line-height: 1.6;
            color: #333;
        }

        /* ========== PANEL RESUMEN TODAS ZONAS ========== */
        #all-zones-summary-panel {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            background: #fff;
            padding: 14px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            font-family: 'Inter', sans-serif;
            z-index: 1100;
            width: 260px;
            flex-direction: column;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }

        #all-zones-summary-panel h3 {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 10px;
            color: #005288;
            text-align: center;
        }

        #all-zones-summary-panel ul {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 13px;
        }

        #all-zones-summary-panel li {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #all-zones-summary-panel li:last-child { border-bottom: none; }

        #all-zones-summary-panel li .zone-name {
            font-weight: 600;
            color: #333;
        }

        #all-zones-summary-panel li .zone-population {
            color: #005288;
            font-weight: 700;
        }

        /* ========== ETIQUETAS DE CAPAS ========== */
        .layer-label {
            position: absolute;
            background-color: transparent;
            color: #000;
            font-weight: 600;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
            transform: translate(-50%, -50%);
            text-shadow:
                -1px -1px 3px rgba(255,255,255,0.9),
                1px -1px 3px rgba(255,255,255,0.9),
                -1px 1px 3px rgba(255,255,255,0.9),
                1px 1px 3px rgba(255,255,255,0.9),
                0 0 5px rgba(255,255,255,0.7);
        }

        /* ========== TOOLTIPS LEAFLET ========== */
        .leaflet-tooltip {
            font-size: 13px !important;
            font-weight: 600 !important;
            font-family: 'Inter', sans-serif !important;
            padding: 8px 12px !important;
            background-color: rgba(255,255,255,0.96) !important;
            border: 2px solid #005288 !important;
            border-radius: 8px !important;
            color: #333 !important;
            box-shadow: 0 3px 10px rgba(0,0,0,0.18) !important;
            max-width: 220px !important;
            white-space: normal !important;
            word-wrap: break-word !important;
            text-align: center !important;
        }

        /* ========== MULTISELECT DROPDOWN ========== */
        .ms-wrap {
            position: relative;
            width: 100%;
        }

        .ms-btn {
            width: 100%;
            padding: 10px 32px 10px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            color: #333;
            text-align: left;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ms-btn:hover {
            background: #f1f3f5;
            border-color: #005288;
        }

        .ms-btn::after {
            content: '▼';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 9px;
            color: #aaa;
        }

        .ms-drop {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.18);
            display: none;
            z-index: 3000;
            overflow: hidden;
        }

        .ms-drop.open { display: block; }

        .ms-actions {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
        }

        .ms-actions button {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: #2c3e50;
            transition: all 0.15s ease;
        }

        .ms-actions button:hover { background: #f1f3f5; border-color: #005288; }

        .ms-actions .apply-btn {
            background: #005288;
            color: white;
            border-color: #004070;
        }

        .ms-actions .apply-btn:hover { background: #004070; }

        .ms-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .ms-list::-webkit-scrollbar { width: 4px; }
        .ms-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

        .ms-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            cursor: pointer;
            transition: background 0.15s ease;
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }

        .ms-item:hover { background: #f0f6fb; }

        .ms-item input[type="checkbox"] {
            width: 15px;
            height: 15px;
            cursor: pointer;
            accent-color: #005288;
            flex-shrink: 0;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 55vh;
                position: relative;
            }
            #map {
                position: relative;
                left: 0;
                height: 45vh;
            }
            .page-title { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- ========== SIDEBAR ========== -->
    <div class="sidebar">

        <!-- Header con logos -->
        <div class="sidebar-header">
            <div class="logo-container">
                <img src="https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/SecreB.png" alt="Secretaría de Salud" style="height:38px;" />
                <img src="https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/HorizontalCTWhite.png" alt="Coordinación Tecnológica" style="height:52px;" />
            </div>
            <div class="header-divider" aria-hidden="true"></div>
            <div class="page-title">Mapa Sanitario - Municipalidad de Córdoba</div>
            <div class="header-bars">
                <div class="bar" style="background-color:#FFDA63;"></div>
                <div class="bar" style="background-color:#DC3545;"></div>
                <div class="bar" style="background-color:#007BFF;"></div>
            </div>
        </div>

        <!-- Buscador -->
        <div class="search-container">
            <input type="text" id="search-efector" placeholder="🔍  Buscar efector..." />
        </div>

        <!-- Leyenda de iconos -->
        <div class="leyenda-container">
            <div class="leyenda-title">Referencias</div>
            <div class="leyenda-items">
                <div class="leyenda-item">
                    <img src="https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/CS.png" alt="CS" />
                    Centros de Salud
                </div>
                <div class="leyenda-item">
                    <img src="https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/HOSP-HPA-PLM.png" alt="HPA" />
                    Hospitales, HPA, Padre La Monaca
                </div>
                <div class="leyenda-item">
                    <img src="https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/EFECTORES.png" alt="Efectores" />
                    Efectores Municipales
                </div>
                <div class="leyenda-item">
                    <img src="https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/establecimientos_publicos.png" alt="Establecimientos" />
                    Establecimientos Públicos
                </div>
            </div>
        </div>

        <!-- Filtros scrollables -->
        <div class="filters-container">

            <!-- Filtros Provincia -->
            <div class="filter-section">
                <div class="filter-header">
                    <span class="filter-icon">🗺️</span>
                    Nivel Provincia
                </div>
                <label class="checkbox-label">
                    <input type="checkbox" id="chkDEPARTAMENTOS" />
                    Departamentos
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chkLOCALIDADES" />
                    Localidades
                </label>
            </div>

            <!-- Filtros Capital -->
            <div class="filter-section">
                <div class="filter-header">
                    <span class="filter-icon">📍</span>
                    Nivel Capital
                </div>

                <!-- Zona -->
                <div class="filter-header-sub">Zona</div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div id="return-button" title="Volver">
                        <img src="https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/atras.png" alt="Volver" />
                    </div>
                    <div class="ms-wrap" id="zonaWrap" style="flex:1;">
                        <button class="ms-btn" id="zonaBtn">— Seleccionar Zona —</button>
                        <div class="ms-drop" id="zonaDrop">
                            <div class="ms-actions">
                                <button type="button" id="zonaBtnTodas">Todas</button>
                                <button type="button" id="zonaBtnNinguna">Ninguna</button>
                                <button type="button" id="zonaBtnAplicar" class="apply-btn">Aplicar</button>
                            </div>
                            <div class="ms-list" id="zonaList"></div>
                        </div>
                    </div>
                </div>
                <select id="selZONA" style="display:none;">
                    <option value="">— Seleccionar Zona —</option>
                    <option value="all">Todas las Zonas</option>
                </select>

                <label class="checkbox-label">
                    <input type="checkbox" id="chkCIRCUITO" />
                    Circuitos
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chkSECCIONALES" />
                    Seccionales
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chkENTEMETROPOLITANO" />
                    Ente Metropolitano
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chkAP" />
                    Áreas Programáticas
                </label>

                <!-- Establecimientos Públicos (dentro de Nivel Capital) -->
                <div class="filter-header-sub" style="margin-top:6px;">Establecimientos Públicos</div>
                <div class="ms-wrap" id="epWrap">
                    <button class="ms-btn" id="epBtn">Seleccionar tipo...</button>
                    <div class="ms-drop" id="epDrop">
                        <div class="ms-actions">
                            <button type="button" id="epAll">Todos</button>
                            <button type="button" id="epNone">Ninguno</button>
                            <button type="button" id="epApply" class="apply-btn">Aplicar</button>
                        </div>
                        <div class="ms-list" id="epList"></div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Status -->
        <div class="status-container">
            <div class="status-text" id="status">Cargando datos...</div>
        </div>

    </div>
    <!-- /sidebar -->

    <!-- Panel info zona individual -->
    <div id="zona-info">
        <div id="zona-titulo">Población de Zona</div>
        <div id="zona-datos"></div>
    </div>

    <!-- Panel resumen todas las zonas -->
    <div id="all-zones-summary-panel">
        <h3>Población por Zona</h3>
        <div id="total-capital-population" style="display:none;"></div>
        <ul id="all-zones-list"></ul>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
    function normalizar(texto) {
        if (!texto) return "";
        return texto
            .toString()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toUpperCase()
            .trim();
    }
    </script>

    <script>

        let efectoresData = null;
        let capaEfectores = null;
        let capaEstablecimientos = null;
        let establecimientosData = [];
        let tiposSeleccionados = new Set();
        const capas = {};
        const capasLabels = {};
        let allZonasFeatures = [];
        let allZonasDataLoaded = false;

        const selZONA = document.getElementById('selZONA');
        const returnButton = document.getElementById('return-button');
        const zonaInfoPanel = document.getElementById('zona-info');
        const allZonesSummaryPanel = document.getElementById('all-zones-summary-panel');
        const allZonesList = document.getElementById('all-zones-list');
        const totalCapitalPopulationDiv = document.getElementById('total-capital-population');
        const statusEl = document.getElementById('status');

        let datosZonasPoblacion = [];

        document.addEventListener("DOMContentLoaded", () => {

            const map = L.map('map', {
                center: [-31.42, -64.18],
                zoom: 11,
                zoomSnap: 0.5,
                wheelPxPerZoomLevel: 80   // zoom con scroll más suave
            });

            // ── Zoom dinámico de íconos ──────────────────────────
            function calcIconSize(base, zoom) {
                // escala los íconos entre zoom 10 y 16
                const factor = Math.max(0.5, Math.min(2, (zoom - 10) * 0.2 + 0.8));
                return Math.round(base * factor);
            }

            function crearIconos(zoom) {
                const sz = {
                    cs:   calcIconSize(28, zoom),
                    hpa:  calcIconSize(38, zoom),
                    ef:   calcIconSize(36, zoom),
                    ep:   calcIconSize(30, zoom),
                };
                return {
                    centroSalud: L.icon({ iconUrl:'https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/CS.png',
                        iconSize:[sz.cs,sz.cs], iconAnchor:[sz.cs/2,sz.cs], popupAnchor:[0,-sz.cs] }),
                    hpa: L.icon({ iconUrl:'https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/HOSP-HPA-PLM.png',
                        iconSize:[sz.hpa,sz.hpa], iconAnchor:[sz.hpa/2,sz.hpa], popupAnchor:[0,-sz.hpa] }),
                    efectores: L.icon({ iconUrl:'https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/EFECTORES.png',
                        iconSize:[sz.ef,sz.ef], iconAnchor:[sz.ef/2,sz.ef], popupAnchor:[0,-sz.ef] }),
                    establecimiento: L.icon({ iconUrl:'https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/assets/establecimientos_publicos.png',
                        iconSize:[sz.ep,sz.ep], iconAnchor:[sz.ep/2,sz.ep], popupAnchor:[0,-sz.ep] }),
                };
            }

            let iconos = crearIconos(11);
            let iconoEfectores      = iconos.efectores;
            let iconoHPA            = iconos.hpa;
            let iconoCentroSalud    = iconos.centroSalud;
            let iconoEstablecimiento = iconos.establecimiento;

            // Redibujar íconos al cambiar zoom
            map.on('zoomend', () => {
                const z = map.getZoom();
                iconos            = crearIconos(z);
                iconoEfectores    = iconos.efectores;
                iconoHPA          = iconos.hpa;
                iconoCentroSalud  = iconos.centroSalud;
                iconoEstablecimiento = iconos.establecimiento;

                // Actualizar íconos en capa activa sin recargar datos
                if (capaEfectores) {
                    capaEfectores.eachLayer(layer => {
                        if (!layer.setIcon) return;
                        const props = layer._datosPrincipales;
                        if (!props) return;
                        const nombre = (props.Centro || '').toLowerCase();
                        const tipo   = (props.Tipo   || '').toLowerCase();
                        if (tipo.includes('hospital') || tipo.includes('hpa') || nombre.includes('padre la monaca'))
                            layer.setIcon(iconoHPA);
                        else if (esNombreEspecial(nombre, tipo))
                            layer.setIcon(iconoEfectores);
                        else
                            layer.setIcon(iconoCentroSalud);
                    });
                }
                if (capaEstablecimientos) {
                    capaEstablecimientos.eachLayer(layer => {
                        if (layer.setIcon) layer.setIcon(iconoEstablecimiento);
                    });
                }
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                keepBuffer: 4,          // mantiene tiles vecinos en memoria
                updateWhenIdle: true,   // no actualiza mientras se arrastra
                attribution: '&copy; OpenStreetMap contributors',
            }).addTo(map);

            /* ============================
               ESTILOS POR CAPA
            ============================ */
            const estilos = (feature, layerName = "") => {
                if (layerName === "SECCIONALES") {
                    const id = feature.properties?.seccional || "";
                    return { color: colorPorSeccional(id), weight: 2, opacity: 1, fillColor: colorPorSeccional(id), fillOpacity: 0.25 };
                }
                if (layerName === "CIRCUITO") {
                    const secc = feature.properties?.seccional || "";
                    return { color: colorPorSeccional(secc), weight: 1.5, opacity: 0.9, fillColor: colorPorSeccional(secc), fillOpacity: 0.12 };
                }
                return {
                    color: feature.properties.stroke || '#3388ff',
                    weight: feature.properties['stroke-width'] || 2,
                    opacity: feature.properties['stroke-opacity'] || 1,
                    fillColor: feature.properties.fill || '#3388ff',
                    fillOpacity: feature.properties['fill-opacity'] || 0.3,
                };
            };

            function getFeatureName(props, layerName) {
                if (layerName === 'CIRCUITO' && props.circuito) return `${props.circuito}`;
                if (layerName === 'SECCIONALES' && props.seccional) return `Seccional ${props.seccional}`;
                if (layerName === 'ENTEMETROPOLITANO' && props.hasOwnProperty('localidad')) return props.localidad;
                if (layerName === 'DEPARTAMENTOS' && props.hasOwnProperty('nombre_departamento')) return props.nombre_departamento;
                if (layerName === 'AP' && props.hasOwnProperty('id_area')) return props.id_area;
                if (props.name) return props.name;
                if (props.NOM_ZONA) return props.NOM_ZONA;
                if (props.CODIGO) return props.CODIGO;
                for (const key in props) {
                    if (typeof props[key] === 'string' && props[key].length > 1 && !/^\d+$/.test(props[key])) return props[key];
                }
                return 'Sin nombre';
            }

            function getCentroid(featureOrCollection) {
                try {
                    const geoJsonLayer = L.geoJSON(featureOrCollection);
                    const bounds = geoJsonLayer.getBounds();
                    if (bounds && bounds.isValid()) return bounds.getCenter();
                } catch (e) { console.error("Error calculando centroide:", e); }
                return null;
            }

            /* ============================
               CARGA DATOS
            ============================ */
            const urlBase = "https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/layers/";

            const fetchEfectores    = fetch("https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/data/efectores.geojson").then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
            const fetchZonasGeo     = fetch("https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/layers/zonas.geojson").then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
            const fetchZonasValores = fetch("https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/data/zonas_valores.json").then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });

            // centros_horarios se carga por separado para no bloquear el mapa si falla
            fetch("https://reporteyanalisisdedatos.github.io/Mapa-Sanitario-Municipal-2026/data/centros_horarios.json")
                .then(r => r.ok ? r.json() : Promise.reject('404'))
                .then(data => {
                    establecimientosData = (data.data || []).filter(d => d.lat && d.lng);
                    inicializarFiltroEstablecimientos();
                })
                .catch(() => {
                    console.warn('centros_horarios.json no disponible aún.');
                });

            Promise.all([fetchEfectores, fetchZonasGeo, fetchZonasValores])
                .then(([efectores, zonasGeo, zonasValores]) => {
                    if (!efectores?.features) throw new Error("efectores.geojson inválido.");
                    if (!zonasGeo?.features)  throw new Error("zonas.geojson inválido.");
                    if (!Array.isArray(zonasValores)) throw new Error("zonas_valores.json inválido.");

                    efectoresData = efectores.features;
                    allZonasFeatures = zonasGeo.features;
                    datosZonasPoblacion = zonasValores;
                    allZonasDataLoaded = true;

                    poblarSelectorZonas(allZonasFeatures);
                    mostrarTodosEfectores();
                    selZONA.value = "";
                    zonaInfoPanel.style.display = 'none';
                    allZonesSummaryPanel.style.display = 'none';
                    returnButton.style.display = 'none';

                    if (statusEl) { statusEl.textContent = `✅ ${efectoresData.length} efectores cargados`; statusEl.classList.add('success'); }

                    document.getElementById('search-efector').addEventListener('input', (e) => {
                        let texto = e.target.value.trim().toLowerCase()
                            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                            .replace(/\bcs[\s#°º\-]*/g, 'centro de salud ')
                            .replace(/n[°º]?\s*/g, '')
                            .replace(/\s+/g, ' ');

                        if (!texto) { mostrarTodosEfectores(); return; }

                        const filtrados = efectoresData.filter(feature => {
                            const nombre = (feature.properties?.Centro || '').toLowerCase()
                                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                                .replace(/\bcs[\s#°º\-]*/g, 'centro de salud ')
                                .replace(/n[°º]?\s*/g, '')
                                .replace(/\s+/g, ' ');
                            return nombre.includes(texto);
                        });

                        if (capaEfectores) map.removeLayer(capaEfectores);

                        capaEfectores = L.geoJSON(filtrados, {
                            pointToLayer: (feature, latlng) => {
                                const props = feature.properties;
                                const nombre = (props.Centro || '').toLowerCase();
                                const tipo = (props.Tipo || '').toLowerCase();
                                let icono = iconoCentroSalud;
                                if (tipo.includes('hospital') || tipo.includes('hpa') || nombre.includes('padre la monaca')) {
                                    icono = iconoHPA;
                                } else if (esNombreEspecial(nombre, tipo)) {
                                    icono = iconoEfectores;
                                }
                                return L.marker(latlng, { icon: icono });
                            },
                            onEachFeature: (feature, layer) => {
                                const props = feature.properties;
                                layer.bindPopup(crearPopupCentroSalud({
                                    nombre: props.Centro, tipo: props.Tipo, direccion: props.Direccion,
                                    poblacion: props.PoblacionTotal ?? 0, mujeres: props.Mujeres ?? 0,
                                    hombres: props.Varones ?? 0, sin_cobertura: props.PoblacionSinCobertura ?? 0,
                                    porcentaje_sin_cobertura: props.PorcentajeSinCobertura ?? 0,
                                    hogares: props.Hogares ?? 0, hogares_nbi: props.HogaresNBI ?? 0
                                }));
                            }
                        }).addTo(map);
                    });
                })
                .catch(error => {
                    console.error("Error cargando datos:", error);
                    if (statusEl) statusEl.textContent = '❌ Error al cargar datos';
                });

            /* ============================
               COLORES SECCIONALES
            ============================ */
            const coloresSeccionales = {
                "01":"#5E5E5E","02":"#0A3732","03":"#0D31E0","04":"#984ea3",
                "05":"#ff7f00","06":"#ffff33","07":"#a65628","08":"#f781bf",
                "09":"#DD328F","10":"#66c2a5","11":"#4C1D96","12":"#8da0cb",
                "13":"#e78ac3","14":"#a6d854","15":"#ffd92f"
            };
            function colorPorSeccional(id) { return coloresSeccionales[id] || "#999999"; }

            /* ============================
               CAPAS GEOJSON
            ============================ */
            const archivosCapas = {
                CIRCUITO: "CIRCUITO_SECCIONALES.json",
                SECCIONALES: "CIRCUITO_SECCIONALES.json",
                DEPARTAMENTOS: "DEPARTAMENTOS.json",
                LOCALIDADES: "LOCALIDADES.json",
                ENTEMETROPOLITANO: "ENTEMETROPOLITANO.json",
                AP: "AP.json"
            };

            for (const nombre in archivosCapas) {
                fetch(urlBase + archivosCapas[nombre])
                    .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
                    .then(geojson => {
                        capas[nombre] = L.geoJSON(geojson, {
                            style: f => estilos(f, nombre),
                            onEachFeature: (feature, layer) => {
                                layer.bindPopup(`<strong>${getFeatureName(feature.properties, nombre)}</strong>`);
                            }
                        });

                        const labelsGroup = L.layerGroup();

                        if (nombre === "SECCIONALES") {
                            const grupos = {};
                            geojson.features.forEach(f => {
                                const id = f.properties?.seccional;
                                if (!id) return;
                                if (!grupos[id]) grupos[id] = [];
                                grupos[id].push(f);
                            });
                            Object.entries(grupos).forEach(([id, features]) => {
                                const centroid = getCentroid({ type: "FeatureCollection", features });
                                if (!centroid) return;
                                labelsGroup.addLayer(L.marker(centroid, {
                                    icon: L.divIcon({ className: 'custom-div-icon', html: `<div class="layer-label">${id}</div>`, iconSize:[0,0], iconAnchor:[0,0] })
                                }));
                            });
                        } else {
                            geojson.features.forEach(feature => {
                                const centroid = getCentroid(feature);
                                if (centroid) {
                                    const name = getFeatureName(feature.properties, nombre);
                                    if (name && name !== 'Sin nombre') {
                                        labelsGroup.addLayer(L.marker(centroid, {
                                            icon: L.divIcon({ className: 'custom-div-icon', html: `<div class="layer-label">${name}</div>`, iconSize:[0,0], iconAnchor:[0,0] })
                                        }));
                                    }
                                }
                            });
                        }

                        capasLabels[nombre] = labelsGroup;
                    })
                    .catch(err => console.error(`Error cargando ${archivosCapas[nombre]}:`, err));
            }

            /* ============================
               SELECTOR ZONAS
            ============================ */
            function poblarSelectorZonas(zonasFeatures) {
                zonasFeatures.sort((a, b) => {
                    const idA = parseInt((a.properties.name || '').replace('ZONA ', ''));
                    const idB = parseInt((b.properties.name || '').replace('ZONA ', ''));
                    return idA - idB;
                });
                zonasFeatures.forEach(feature => {
                    const zona_id_str = (feature.properties.name || '').replace('ZONA ', '').trim();
                    if (zona_id_str) {
                        // select oculto
                        const option = document.createElement('option');
                        option.value = zona_id_str;
                        option.textContent = `ZONA ${zona_id_str}`;
                        selZONA.appendChild(option);

                        // dropdown visual
                        const item = document.createElement('div');
                        item.className = 'ms-item';
                        item.dataset.value = zona_id_str;
                        item.textContent = `ZONA ${zona_id_str}`;
                        item.style.cursor = 'pointer';
                        item.style.padding = '8px 12px';
                        item.style.fontSize = '13px';
                        item.style.fontWeight = '500';
                        item.addEventListener('click', () => {
                            selZONA.value = zona_id_str;
                            zonaBtn.textContent = `ZONA ${zona_id_str}`;
                            zonaDrop.classList.remove('open');
                            selZONA.dispatchEvent(new Event('change'));
                        });
                        document.getElementById('zonaList').appendChild(item);
                    }
                });

                // Dropdown toggle
                const zonaBtn  = document.getElementById('zonaBtn');
                const zonaDrop = document.getElementById('zonaDrop');

                zonaBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    zonaDrop.classList.toggle('open');
                });
                document.addEventListener('click', () => zonaDrop.classList.remove('open'));
                zonaDrop.addEventListener('click', e => e.stopPropagation());

                document.getElementById('zonaBtnTodas').addEventListener('click', () => {
                    selZONA.value = 'all';
                    zonaBtn.textContent = 'Todas las Zonas';
                    zonaDrop.classList.remove('open');
                    selZONA.dispatchEvent(new Event('change'));
                });

                document.getElementById('zonaBtnNinguna').addEventListener('click', () => {
                    selZONA.value = '';
                    zonaBtn.textContent = '— Seleccionar Zona —';
                    zonaDrop.classList.remove('open');
                    selZONA.dispatchEvent(new Event('change'));
                });

                document.getElementById('zonaBtnAplicar').addEventListener('click', () => {
                    zonaDrop.classList.remove('open');
                });

                selZONA.onchange = (e) => {
                    const selectedValue = e.target.value;
                    if (capas.ZONA && map.hasLayer(capas.ZONA)) map.removeLayer(capas.ZONA);
                    zonaInfoPanel.style.display = 'none';
                    allZonesSummaryPanel.style.display = 'none';

                    if (selectedValue === 'all') {
                        capas.ZONA = L.geoJSON(
                            { type: 'FeatureCollection', features: allZonasFeatures },
                            {
                                style: estilos,
                                onEachFeature: (feature, layer) => {
                                    const zona_id_str = (feature.properties.name || '').replace('ZONA ', '').trim();
                                    const zona_id = parseInt(zona_id_str) || 0;
                                    layer.on('click', () => {
                                        selZONA.value = zona_id_str;
                                        const zonaBtn = document.getElementById('zonaBtn');
                                        if (zonaBtn) zonaBtn.textContent = `ZONA ${zona_id_str}`;
                                        mostrarEfectoresPorZona(zona_id);
                                        map.fitBounds(layer.getBounds(), { padding: [20, 20] });
                                        returnButton.style.display = 'flex';
                                        zonaInfoPanel.style.display = 'flex';
                                        allZonesSummaryPanel.style.display = 'none';
                                    });
                                }
                            }
                        ).addTo(map);
                        mostrarTodosEfectores();
                        mostrarResumenTodasZonas();
                        map.setView([-31.42, -64.18], 11);
                        returnButton.style.display = 'flex';

                    } else if (selectedValue) {
                        const selectedFeature = allZonasFeatures.find(f =>
                            (f.properties.name || '').replace('ZONA ', '').trim() === selectedValue
                        );
                        if (selectedFeature) {
                            const zona_id = parseInt(selectedValue);
                            capas.ZONA = L.geoJSON(selectedFeature, {
                                style: estilos,
                                onEachFeature: (feature, layer) => {
                                    layer.on('click', () => {
                                        mostrarEfectoresPorZona(zona_id);
                                        map.fitBounds(layer.getBounds(), { padding: [20, 20] });
                                        zonaInfoPanel.style.display = 'flex';
                                        allZonesSummaryPanel.style.display = 'none';
                                    });
                                }
                            }).addTo(map);
                            map.fitBounds(L.geoJSON(selectedFeature).getBounds(), { padding: [20, 20] });
                            mostrarEfectoresPorZona(zona_id);
                            returnButton.style.display = 'flex';
                        }
                    } else {
                        mostrarTodosEfectores();
                        zonaInfoPanel.style.display = 'none';
                        returnButton.style.display = 'none';
                        allZonesSummaryPanel.style.display = 'none';
                        map.setView([-31.42, -64.18], 11);
                    }
                };
            }

            returnButton.onclick = () => {
                const zonaBtn = document.getElementById('zonaBtn');
                if (selZONA.value === "all") {
                    selZONA.value = "";
                    if (zonaBtn) zonaBtn.textContent = '— Seleccionar Zona —';
                } else {
                    selZONA.value = "all";
                    if (zonaBtn) zonaBtn.textContent = 'Todas las Zonas';
                }
                selZONA.dispatchEvent(new Event('change'));
            };

            /* ============================
               TOGGLES CAPAS
            ============================ */
            document.getElementById('chkCIRCUITO').onchange = e => toggleLayer('CIRCUITO', e.target.checked);
            document.getElementById('chkSECCIONALES').onchange = e => toggleLayer('SECCIONALES', e.target.checked);
            document.getElementById('chkENTEMETROPOLITANO').onchange = e => toggleLayer('ENTEMETROPOLITANO', e.target.checked);
            document.getElementById('chkDEPARTAMENTOS').onchange = e => toggleLayer('DEPARTAMENTOS', e.target.checked);
            document.getElementById('chkLOCALIDADES').onchange = e => toggleLayer('LOCALIDADES', e.target.checked);
            document.getElementById('chkAP').onchange = e => toggleLayer('AP', e.target.checked);

            function toggleLayer(nombre, visible) {
                if (!capas[nombre]) { console.warn(`Capa '${nombre}' no cargada.`); return; }
                if (visible) {
                    capas[nombre].addTo(map);
                    if (capasLabels[nombre]) capasLabels[nombre].addTo(map);
                } else {
                    map.removeLayer(capas[nombre]);
                    if (capasLabels[nombre]) map.removeLayer(capasLabels[nombre]);
                }
            }

            /* ============================
               HELPER - NOMBRES ESPECIALES
            ============================ */
            const nombresEspecialesList = [
                'medicina preventiva','dem','secretaría de salud','secretaria de salud',
                'adicciones','salud mental','pec','direccion de calidad alimentaria',
                'direccion de emergencias medicas 107','direccion de epidemiologia',
                'laboratorio farmaceutico municipal','telesalud','pec los robles',
                'dtc villa el libertador','pec comercial',
                'secretaría de prev. y atenc. comunitaria','secretaria de prev. y atenc. comunitaria',
                'centro comunitario maldonado','centro municipal de salud mental - aldeas',
                'centro municipal de salud mental - jaire','centro municipal de salud mental - lazos',
                'centro municipal de salud mental - pec maldonado','centro municipal de salud mental - pec yapeyu',
                'centro municipal de salud mental - raíces','centro municipal de salud mental - raices',
                'centro municipal de salud mental - tramas','direccion de salud mental',
                'dirección de salud mental'
            ];
            function esNombreEspecial(nombre, tipo) {
                if (tipo && (tipo.includes('servicio odontol') || tipo.includes('odontol'))) return true;
                return nombresEspecialesList.some(k => nombre.includes(k));
            }

            /* ============================
               ESTABLECIMIENTOS PÚBLICOS
            ============================ */
            // Tipos que ya se muestran como íconos principales → excluir del filtro
            const tiposExcluidos = [
                'Centro de Salud', 'Clinica', 'Clínica', 'DEM', 'EAC',
                'Hospital Municipal Cordoba', 'Hospital de Pronta Atención',
                'Hospital Provincial Cordoba', 'Padre La Monaca',
                'Salud Mental', 'Secretaría de Salud', 'Medicina Preventiva'
            ];

            function inicializarFiltroEstablecimientos() {
                const tipos = [...new Set(
                    establecimientosData
                        .map(d => d.tipo)
                        .filter(t => t && t.trim() !== '' && !tiposExcluidos.includes(t))
                )].sort();

                const epList = document.getElementById('epList');
                epList.innerHTML = '';

                tipos.forEach(tipo => {
                    const item = document.createElement('div');
                    item.className = 'ms-item';
                    item.innerHTML = `
                        <input type="checkbox" data-tipo="${tipo}" />
                        <span>${tipo}</span>`;
                    epList.appendChild(item);
                });

                // Dropdown toggle
                const epBtn  = document.getElementById('epBtn');
                const epDrop = document.getElementById('epDrop');

                epBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    epDrop.classList.toggle('open');
                });

                document.addEventListener('click', () => epDrop.classList.remove('open'));
                epDrop.addEventListener('click', e => e.stopPropagation());

                // Todos / Ninguno
                document.getElementById('epAll').addEventListener('click', () => {
                    epList.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
                });
                document.getElementById('epNone').addEventListener('click', () => {
                    epList.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                });

                // Aplicar
                document.getElementById('epApply').addEventListener('click', () => {
                    tiposSeleccionados.clear();
                    epList.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
                        tiposSeleccionados.add(cb.dataset.tipo);
                    });

                    if (tiposSeleccionados.size === 0) {
                        // etiqueta del botón
                        epBtn.textContent = 'Seleccionar tipo...';
                        // quitar capa del mapa
                        if (capaEstablecimientos) {
                            map.removeLayer(capaEstablecimientos);
                            capaEstablecimientos = null;
                        }
                    } else {
                        const cantidad = tiposSeleccionados.size;
                        epBtn.textContent = cantidad === 1
                            ? [...tiposSeleccionados][0]
                            : `${cantidad} tipos seleccionados`;
                        renderEstablecimientos();
                    }

                    epDrop.classList.remove('open');
                });
            }

            function renderEstablecimientos() {
                if (capaEstablecimientos) {
                    map.removeLayer(capaEstablecimientos);
                    capaEstablecimientos = null;
                }

                const filtrados = establecimientosData.filter(d => tiposSeleccionados.has(d.tipo));
                if (!filtrados.length) return;

                capaEstablecimientos = L.layerGroup();

                filtrados.forEach(d => {
                    const marker = L.marker([d.lat, d.lng], { icon: iconoEstablecimiento });
                    marker.bindPopup(`
                        <div style="font-family:'Inter',sans-serif;min-width:200px;">
                            <div style="font-weight:700;font-size:14px;margin-bottom:6px;color:#005288;text-align:center;">
                                ${d.centro || 'S/D'}
                            </div>
                            <div style="font-size:13px;line-height:1.6;">
                                <div><b>Tipo:</b> ${d.tipo || 'S/D'}</div>
                                <div><b>Dirección:</b> ${d.direccion || 'S/D'}</div>
                                <div><b>Institución:</b> ${d.institucion || 'S/D'}</div>
                            </div>
                        </div>`);
                    capaEstablecimientos.addLayer(marker);
                });

                capaEstablecimientos.addTo(map);
            }

            /* ============================
               MOSTRAR EFECTORES
            ============================ */
            function mostrarTodosEfectores() {
                if (!efectoresData) return;
                if (capaEfectores) map.removeLayer(capaEfectores);

                const agrupados = {};
                efectoresData.forEach(feature => {
                    const coords = feature.geometry?.coordinates;
                    if (!coords) return;
                    const key = `${coords[0].toFixed(6)}|${coords[1].toFixed(6)}`;
                    if (!agrupados[key]) agrupados[key] = [];
                    agrupados[key].push(feature);
                });

                const featuresAgrupadas = Object.entries(agrupados).map(([key, grupo]) => {
                    const [lng, lat] = key.split('|').map(Number);
                    return { type:'Feature', geometry:{ type:'Point', coordinates:[lng,lat] }, properties:{ grupoEfectores: grupo.map(f=>f.properties) } };
                });

                capaEfectores = L.geoJSON(featuresAgrupadas, {
                    pointToLayer: (feature, latlng) => {
                        const props = feature.properties.grupoEfectores[0];
                        const nombre = (props.Centro || '').toLowerCase();
                        const tipo = (props.Tipo || '').toLowerCase();
                        let icono = iconoCentroSalud;
                        if (tipo.includes('hospital') || tipo.includes('hpa') || nombre.includes('padre la monaca')) icono = iconoHPA;
                        else if (esNombreEspecial(nombre, tipo)) icono = iconoEfectores;
                        const m = L.marker(latlng, { icon: icono });
                        m._datosPrincipales = props; // ref para zoom dinámico
                        return m;
                    },
                    onEachFeature: (feature, layer) => {
                        const popups = feature.properties.grupoEfectores.map(props => crearPopupCentroSalud({
                            nombre: props.Centro, tipo: props.Tipo, direccion: props.Direccion,
                            poblacion: props.PoblacionTotal ?? 0, mujeres: props.Mujeres ?? 0,
                            hombres: props.Varones ?? 0, sin_cobertura: props.PoblacionSinCobertura ?? 0,
                            porcentaje_sin_cobertura: props.PorcentajeSinCobertura ?? 0,
                            hogares: props.Hogares ?? 0, hogares_nbi: props.HogaresNBI ?? 0
                        }));
                        layer.bindPopup(popups.join('<hr style="margin:6px 0">'));
                    }
                }).addTo(map);
            }

            function mostrarEfectoresPorZona(zonaId) {
                if (!efectoresData) return;
                if (capaEfectores) map.removeLayer(capaEfectores);

                const filtrados = efectoresData.filter(e => parseInt(e.properties.Zona) === zonaId);

                const zonaStats = filtrados.reduce((acc, e) => {
                    const p = e.properties;
                    acc.poblacion += p.PoblacionTotal || 0;
                    acc.mujeres   += p.Mujeres || 0;
                    acc.hombres   += p.Varones || 0;
                    acc.hogares   += p.Hogares || 0;
                    acc.hogares_nbi += p.HogaresNBI || 0;
                    acc.sin_cobertura += p.PoblacionSinCobertura || 0;
                    return acc;
                }, { poblacion:0, mujeres:0, hombres:0, hogares:0, hogares_nbi:0, sin_cobertura:0 });

                document.getElementById('zona-datos').innerHTML = `
                    <div style="font-size:28px;font-weight:700;text-align:center;color:#005288;margin-bottom:10px;">
                        ${zonaStats.poblacion.toLocaleString('es-AR')}
                    </div>
                    <div style="font-size:13px;line-height:1.7;">
                        <div><b style="color:#C06090;">Mujeres:</b> ${zonaStats.mujeres.toLocaleString('es-AR')} <span style="color:#888">(${porcentaje(zonaStats.mujeres,zonaStats.poblacion)}%)</span></div>
                        <div><b style="color:#3C5AB7;">Varones:</b> ${zonaStats.hombres.toLocaleString('es-AR')} <span style="color:#888">(${porcentaje(zonaStats.hombres,zonaStats.poblacion)}%)</span></div>
                        <div><b>Hogares:</b> ${zonaStats.hogares.toLocaleString('es-AR')} <span style="color:#888">(${porcentaje(zonaStats.hogares,zonaStats.poblacion)}%)</span></div>
                        <div><b>Hogares NBI:</b> ${zonaStats.hogares_nbi.toLocaleString('es-AR')} <span style="color:#888">(${porcentaje(zonaStats.hogares_nbi,zonaStats.poblacion)}%)</span></div>
                        <div><b>Pob. Cobertura Pública Excl.:</b> ${zonaStats.sin_cobertura.toLocaleString('es-AR')} <span style="color:#888">(${porcentaje(zonaStats.sin_cobertura,zonaStats.poblacion)}%)</span></div>
                    </div>
                `;
                document.getElementById('zona-titulo').textContent = `Población de Zona ${zonaId}`;
                zonaInfoPanel.style.display = 'flex';
                allZonesSummaryPanel.style.display = 'none';

                const coordsUnicas = {};
                filtrados.forEach(feature => {
                    const [lng, lat] = feature.geometry.coordinates;
                    const key = `${lat},${lng}`;
                    if (!coordsUnicas[key]) coordsUnicas[key] = [];
                    coordsUnicas[key].push(feature);
                });

                capaEfectores = L.layerGroup();
                Object.entries(coordsUnicas).forEach(([key, features]) => {
                    const [lat, lng] = key.split(',').map(parseFloat);
                    const props = features[0].properties;
                    const nombre = (props.Centro || '').toLowerCase();
                    const tipo = (props.Tipo || '').toLowerCase();
                    let icono = iconoCentroSalud;
                    if (tipo.includes('hospital') || tipo.includes('hpa') || nombre.includes('padre la monaca')) icono = iconoHPA;
                    else if (esNombreEspecial(nombre, tipo)) icono = iconoEfectores;

                    const popupHtml = features.map(f => {
                        const p = f.properties;
                        return crearPopupCentroSalud({
                            nombre: p.Centro, tipo: p.Tipo, direccion: p.Direccion,
                            poblacion: p.PoblacionTotal ?? 0, mujeres: p.Mujeres ?? 0,
                            hombres: p.Varones ?? 0, sin_cobertura: p.PoblacionSinCobertura ?? 0,
                            porcentaje_sin_cobertura: p.PorcentajeSinCobertura ?? 0,
                            hogares: p.Hogares ?? 0, hogares_nbi: p.HogaresNBI ?? 0
                        });
                    }).join('<hr style="margin:8px 0;">');

                    const mk = L.marker([lat,lng],{icon:icono});
                    mk._datosPrincipales = features[0].properties;
                    mk.bindPopup(popupHtml);
                    capaEfectores.addLayer(mk);
                });

                capaEfectores.addTo(map);
            }

            /* ============================
               POPUP CENTROS
            ============================ */
            function crearPopupCentroSalud(datos) {
                const tipo   = (datos.tipo || '').toLowerCase();
                const nombre = (datos.nombre || '').toLowerCase();
                const nombreLimpio = (datos.nombre || 'Centro de Salud').split('#')[0].trim();
                const isHospital = tipo.includes('hospital') || tipo.includes('hpa') || nombre.includes('padre la monaca') || esNombreEspecial(nombre);

                if (isHospital) {
                    return `
                        <div style="font-family:'Inter',sans-serif;min-width:220px;">
                            <div style="font-weight:700;font-size:14px;margin-bottom:8px;color:#005288;text-align:center;">${nombreLimpio}</div>
                            <div style="font-size:13px;line-height:1.6;">
                                <div><b>Tipo:</b> ${datos.tipo || 'S/D'}</div>
                                <div><b>Dirección:</b> ${datos.direccion || 'S/D'}</div>
                            </div>
                        </div>`;
                } else {
                    return `
                        <div style="font-family:'Inter',sans-serif;min-width:220px;">
                            <div style="font-weight:700;font-size:14px;margin-bottom:4px;color:#005288;text-align:center;">${nombreLimpio}</div>
                            <div style="font-size:26px;font-weight:700;text-align:center;color:#005288;margin-bottom:8px;">${(datos.poblacion||0).toLocaleString('es-AR')}</div>
                            <div style="font-size:13px;line-height:1.6;">
                                <div><b>Tipo:</b> ${datos.tipo || 'S/D'}</div>
                                <div><b>Dirección:</b> ${datos.direccion || 'S/D'}</div>
                                <div><b>Pob. Cobertura Pública Excl.:</b> ${(datos.sin_cobertura||0).toLocaleString('es-AR')} <span style="color:#888">(${datos.porcentaje_sin_cobertura||'0%'})</span></div>
                                <div><b style="color:#C06090;">Mujeres:</b> ${(datos.mujeres||0).toLocaleString('es-AR')} <span style="color:#888">(${porcentaje(datos.mujeres,datos.poblacion)}%)</span></div>
                                <div><b style="color:#3C5AB7;">Varones:</b> ${(datos.hombres||0).toLocaleString('es-AR')} <span style="color:#888">(${porcentaje(datos.hombres,datos.poblacion)}%)</span></div>
                                <div><b>Hogares:</b> ${(datos.hogares||0).toLocaleString('es-AR')}</div>
                                <div><b>Hogares NBI:</b> ${(datos.hogares_nbi||0).toLocaleString('es-AR')}</div>
                            </div>
                        </div>`;
                }
            }

            function porcentaje(parte, total) {
                if (!parte || !total || total === 0) return '0';
                return ((parte / total) * 100).toFixed(2);
            }

            /* ============================
               RESUMEN TODAS LAS ZONAS
            ============================ */
            function mostrarResumenTodasZonas() {
                if (!Array.isArray(datosZonasPoblacion) || !datosZonasPoblacion.length) return;

                allZonesList.innerHTML = '';
                const zonasSin7 = datosZonasPoblacion.filter(z => String(z.Zona) !== '7');
                const totalCapital = datosZonasPoblacion.reduce((acc, z) => acc + (z.PoblacionTotal || 0), 0);

                const panelHeader = allZonesSummaryPanel.querySelector('h3');
                panelHeader.innerHTML = `
                    Población por Zona<br>
                    <span style="font-size:12px;font-weight:400;color:#555;">
                        Total Capital: ${totalCapital.toLocaleString('es-AR')}
                    </span>`;

                totalCapitalPopulationDiv.style.display = 'none';

                [...zonasSin7].sort((a,b) => parseInt(a.Zona)-parseInt(b.Zona)).forEach(z => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span class="zone-name">ZONA ${z.Zona}</span>
                        <span class="zone-population">${(z.PoblacionTotal||0).toLocaleString('es-AR')}</span>`;
                    allZonesList.appendChild(li);
                });

                zonaInfoPanel.style.display = 'none';
                allZonesSummaryPanel.style.display = 'flex';
            }

        }); // DOMContentLoaded
    </script>

</body>
</html>
